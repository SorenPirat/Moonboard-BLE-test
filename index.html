<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoonBoard BLE Test</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: min(680px, 100%);
      background: rgba(17, 24, 39, 0.94);
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
    }
    .row {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }
    @media (min-width: 700px) {
      .row {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
    }
    input, button, textarea, select {
      background: #0b1220;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.95rem;
    }
    button {
      cursor: pointer;
      background: #1f2937;
    }
    button.primary {
      background: #14532d;
      border-color: #166534;
    }
    button.warn {
      background: #7f1d1d;
      border-color: #991b1b;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .actions-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    #status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #0b1220;
      border: 1px solid #334155;
      color: var(--muted);
      min-height: 20px;
    }
    pre {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      max-height: min(42vh, 320px);
      min-height: 120px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: clamp(12px, 2.8vw, 14px);
      line-height: 1.35;
    }
    .ok { color: var(--accent); }
    .err { color: var(--danger); }
  </style>
</head>
<body>
  <div class="card">
    <h1>MoonBoard BLE Test</h1>
    <p>Denne side bruger Web Bluetooth (typisk Android + Chrome). iPhone Safari/PWA understøtter normalt ikke Web Bluetooth.</p>
    <div class="row">
      <label>
        Service UUID
        <input id="serviceUuid" value="0000ffe0-0000-1000-8000-00805f9b34fb" />
      </label>
      <label>
        Write Characteristic UUID
        <input id="charUuid" value="0000ffe1-0000-1000-8000-00805f9b34fb" />
      </label>
    </div>
    <label>
      <input id="scanAll" type="checkbox" checked />
      Scan all BLE devices (anbefalet til fejlsøgning)
    </label>
    <div class="actions">
      <button id="connectBtn" class="primary">Connect BLE</button>
      <button id="disconnectBtn">Disconnect</button>
    </div>
    <div class="actions-3">
      <button id="onBtn">Send LED ON</button>
      <button id="offBtn">Send LED OFF</button>
      <button id="pulseBtn">Send PULSE</button>
    </div>
    <label style="margin-top: 10px;">
      Custom command (ASCII)
      <input id="customCommand" placeholder="fx: LED:SHOW:TOP" />
    </label>
    <div class="actions">
      <button id="sendCustomBtn">Send Custom</button>
      <button id="clearLogBtn" class="warn">Clear Log</button>
    </div>
    <hr style="border-color:#334155; margin:16px 0;" />
    <h2 style="margin:0; font-size:1.05rem;">Local Problem Test</h2>
    <p>Loader lokale testproblemer fra <code>problems.sample.json</code>.</p>
    <div class="actions">
      <button id="loadProblemsBtn">Load Problems</button>
      <button id="sendProblemBtn">Show Problem LEDs</button>
    </div>
    <label style="margin-top: 10px;">
      Problem
      <select id="problemSelect">
        <option value="">Ingen problemer loaded endnu</option>
      </select>
    </label>
    <div id="problemMeta" style="margin-top:8px; color:#9ca3af; font-size:0.92rem;">Vælg et problem for detaljer.</div>
    <div class="actions">
      <button id="topProblemBtn" class="primary">Top Problem (LED show)</button>
      <button id="copyPayloadBtn">Copy LED Payload</button>
    </div>
    <div id="status">Ikke forbundet.</div>
    <pre id="log"></pre>
  </div>

  <script>
    const serviceUuidInput = document.getElementById("serviceUuid");
    const charUuidInput = document.getElementById("charUuid");
    const scanAllInput = document.getElementById("scanAll");
    const customCommandInput = document.getElementById("customCommand");
    const problemSelect = document.getElementById("problemSelect");
    const problemMeta = document.getElementById("problemMeta");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const onBtn = document.getElementById("onBtn");
    const offBtn = document.getElementById("offBtn");
    const pulseBtn = document.getElementById("pulseBtn");
    const sendCustomBtn = document.getElementById("sendCustomBtn");
    const clearLogBtn = document.getElementById("clearLogBtn");
    const loadProblemsBtn = document.getElementById("loadProblemsBtn");
    const sendProblemBtn = document.getElementById("sendProblemBtn");
    const topProblemBtn = document.getElementById("topProblemBtn");
    const copyPayloadBtn = document.getElementById("copyPayloadBtn");

    let device = null;
    let server = null;
    let characteristic = null;
    let problems = [];
    const LOG_MAX_LINES = 120;
    const COMMON_SERVICE_UUIDS = [
      "0000ffe0-0000-1000-8000-00805f9b34fb", // HM-10 style UART
      "6e400001-b5a3-f393-e0a9-e50e24dcca9e", // Nordic UART service
      "0000fff0-0000-1000-8000-00805f9b34fb"
    ];

    function now() {
      return new Date().toLocaleTimeString("da-DK");
    }

    function log(msg, cls = "") {
      const prefix = `[${now()}] `;
      const line = `${prefix}${msg}`;
      const lines = logEl.textContent ? logEl.textContent.split("\n") : [];
      lines.push(line);
      if (lines.length > LOG_MAX_LINES) {
        lines.splice(0, lines.length - LOG_MAX_LINES);
      }
      logEl.textContent = lines.join("\n");
      logEl.scrollTop = logEl.scrollHeight;
      if (cls) {
        statusEl.className = cls;
      }
      statusEl.textContent = msg;
    }

    function fitLogHeight() {
      const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const target = Math.max(120, Math.min(360, Math.floor(viewportHeight * 0.35)));
      logEl.style.maxHeight = `${target}px`;
    }

    function ensureWebBluetooth() {
      if (!navigator.bluetooth) {
        throw new Error("Web Bluetooth er ikke tilgængelig i denne browser.");
      }
    }

    function buildOptionalServices(userServiceUuid) {
      const all = [...COMMON_SERVICE_UUIDS];
      if (userServiceUuid) {
        all.push(userServiceUuid);
      }
      return [...new Set(all.map((s) => s.toLowerCase()))];
    }

    function isWritable(c) {
      return c?.properties?.write || c?.properties?.writeWithoutResponse;
    }

    async function findWritableCharacteristic(services, preferredCharUuid) {
      const normalizedPreferred = preferredCharUuid ? preferredCharUuid.toLowerCase() : "";

      for (const service of services) {
        const chars = await service.getCharacteristics();
        for (const c of chars) {
          if (normalizedPreferred && c.uuid.toLowerCase() === normalizedPreferred && isWritable(c)) {
            return { service, characteristic: c };
          }
        }
      }

      for (const service of services) {
        const chars = await service.getCharacteristics();
        for (const c of chars) {
          if (isWritable(c)) {
            return { service, characteristic: c };
          }
        }
      }

      return null;
    }

    async function connect() {
      ensureWebBluetooth();

      const serviceUuid = serviceUuidInput.value.trim();
      const charUuid = charUuidInput.value.trim();
      const scanAll = scanAllInput.checked;
      const optionalServices = buildOptionalServices(serviceUuid);

      const requestOptions = scanAll
        ? { acceptAllDevices: true, optionalServices }
        : { filters: [{ services: [serviceUuid || COMMON_SERVICE_UUIDS[0]] }], optionalServices };

      device = await navigator.bluetooth.requestDevice(requestOptions);

      device.addEventListener("gattserverdisconnected", () => {
        log("Forbindelse afbrudt.", "err");
      });

      server = await device.gatt.connect();
      const services = await server.getPrimaryServices();
      if (!services.length) {
        throw new Error("Ingen services fundet. Enheden er muligvis ikke BLE-GATT eller skjuler services for Web Bluetooth.");
      }
      log(`Fundne services: ${services.map((s) => s.uuid).join(", ")}`);

      let selectedService = null;
      let selectedChar = null;

      if (serviceUuid && charUuid) {
        try {
          const service = await server.getPrimaryService(serviceUuid);
          const char = await service.getCharacteristic(charUuid);
          if (isWritable(char)) {
            selectedService = service;
            selectedChar = char;
          }
        } catch (_err) {
          log("Kunne ikke bruge angivet service/characteristic. Prøver auto-discovery...");
        }
      }

      if (!selectedChar) {
        const found = await findWritableCharacteristic(services, charUuid);
        if (!found) {
          throw new Error("Ingen writable characteristic fundet. Angiv korrekt UUID manuelt.");
        }
        selectedService = found.service;
        selectedChar = found.characteristic;
      }

      characteristic = selectedChar;
      serviceUuidInput.value = selectedService.uuid;
      charUuidInput.value = selectedChar.uuid;
      log(`Forbundet til ${device.name || "ukendt enhed"} | service=${selectedService.uuid} | char=${selectedChar.uuid}`, "ok");
    }

    async function disconnect() {
      if (device && device.gatt && device.gatt.connected) {
        device.gatt.disconnect();
        log("Disconnected.", "");
      } else {
        log("Ingen aktiv BLE-forbindelse.", "");
      }
    }

    async function sendAsciiCommand(command) {
      if (!characteristic) {
        throw new Error("Ikke forbundet. Tryk Connect BLE først.");
      }
      const encoder = new TextEncoder();
      const payload = encoder.encode(command);
      await characteristic.writeValue(payload);
      log(`Sendte: ${JSON.stringify(command)}`, "ok");
    }

    function getSelectedProblem() {
      const problemId = problemSelect.value;
      return problems.find((p) => p.id === problemId) || null;
    }

    function ledPayloadForProblem(problem, mode = "SHOW") {
      return `LED:${mode}:PROBLEM:${problem.id}`;
    }

    function renderProblemMeta() {
      const p = getSelectedProblem();
      if (!p) {
        problemMeta.textContent = "Vælg et problem for detaljer.";
        return;
      }
      problemMeta.textContent =
        `${p.name} | ${p.grade} | greb: ${p.holdCount} | setter: ${p.setter} | benchmark: ${p.isBenchmark ? "ja" : "nej"}`;
    }

    async function loadProblems() {
      const res = await fetch("./problems.sample.json", { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`Kunne ikke loade problems.sample.json (${res.status})`);
      }
      const data = await res.json();
      if (!Array.isArray(data)) {
        throw new Error("problems.sample.json skal være en array.");
      }
      problems = data;
      problemSelect.innerHTML = "";
      const first = document.createElement("option");
      first.value = "";
      first.textContent = "Vælg problem";
      problemSelect.appendChild(first);
      for (const p of problems) {
        const option = document.createElement("option");
        option.value = p.id;
        option.textContent = `${p.name} (${p.grade})`;
        problemSelect.appendChild(option);
      }
      log(`Loaded ${problems.length} lokale problemer.`, "ok");
      renderProblemMeta();
    }

    connectBtn.addEventListener("click", async () => {
      try {
        await connect();
      } catch (err) {
        log(`Connect fejl: ${err.message}`, "err");
      }
    });

    disconnectBtn.addEventListener("click", async () => {
      try {
        await disconnect();
      } catch (err) {
        log(`Disconnect fejl: ${err.message}`, "err");
      }
    });

    onBtn.addEventListener("click", async () => {
      try {
        await sendAsciiCommand("LED:ON");
      } catch (err) {
        log(`Send fejl: ${err.message}`, "err");
      }
    });

    offBtn.addEventListener("click", async () => {
      try {
        await sendAsciiCommand("LED:OFF");
      } catch (err) {
        log(`Send fejl: ${err.message}`, "err");
      }
    });

    pulseBtn.addEventListener("click", async () => {
      try {
        await sendAsciiCommand("LED:PULSE");
      } catch (err) {
        log(`Send fejl: ${err.message}`, "err");
      }
    });

    sendCustomBtn.addEventListener("click", async () => {
      try {
        const cmd = customCommandInput.value.trim();
        if (!cmd) {
          throw new Error("Skriv en custom command først.");
        }
        await sendAsciiCommand(cmd);
      } catch (err) {
        log(`Send fejl: ${err.message}`, "err");
      }
    });

    loadProblemsBtn.addEventListener("click", async () => {
      try {
        await loadProblems();
      } catch (err) {
        log(`Load fejl: ${err.message}`, "err");
      }
    });

    sendProblemBtn.addEventListener("click", async () => {
      try {
        const p = getSelectedProblem();
        if (!p) {
          throw new Error("Vælg et problem først.");
        }
        await sendAsciiCommand(ledPayloadForProblem(p, "SHOW"));
      } catch (err) {
        log(`Send fejl: ${err.message}`, "err");
      }
    });

    topProblemBtn.addEventListener("click", async () => {
      try {
        const p = getSelectedProblem();
        if (!p) {
          throw new Error("Vælg et problem først.");
        }
        await sendAsciiCommand(ledPayloadForProblem(p, "TOP"));
      } catch (err) {
        log(`Top fejl: ${err.message}`, "err");
      }
    });

    copyPayloadBtn.addEventListener("click", async () => {
      try {
        const p = getSelectedProblem();
        if (!p) {
          throw new Error("Vælg et problem først.");
        }
        const payload = ledPayloadForProblem(p, "TOP");
        await navigator.clipboard.writeText(payload);
        log(`Payload kopieret: ${payload}`, "ok");
      } catch (err) {
        log(`Copy fejl: ${err.message}`, "err");
      }
    });

    problemSelect.addEventListener("change", renderProblemMeta);

    clearLogBtn.addEventListener("click", () => {
      logEl.textContent = "";
      statusEl.textContent = "Log ryddet.";
      statusEl.className = "";
    });

    fitLogHeight();
    window.addEventListener("resize", fitLogHeight);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fitLogHeight);
    }

    loadProblems().catch((err) => {
      log(`Auto-load fejl: ${err.message}`, "err");
    });
  </script>
</body>
</html>
